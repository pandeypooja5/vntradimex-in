<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8936f;stop-opacity:1" />
    </linearGradient>
    <pattern id="fabric" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="10" height="10" fill="#f5f1ed"/>
      <rect x="10" y="10" width="10" height="10" fill="#f5f1ed"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#gradient4)"/>
  <rect x="80" y="80" width="240" height="140" fill="url(#fabric)" opacity="0.7"/>
  <text x="200" y="250" font-size="24" font-weight="bold" fill="#f5f1ed" text-anchor="middle">Organic Fabric</text>
  <text x="200" y="285" font-size="14" fill="#d4d4d4" text-anchor="middle">Certified Natural Textiles</text>
</svg>